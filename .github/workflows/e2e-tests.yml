name: E2E Tests CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BASE_URL: https://douglasqa.netlify.app/

jobs:
  test-playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright Tests
        run: npm run test:playwright
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  test-cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Cypress Tests
        run: npm run test:cypress

  test-selenium:
    name: Selenium WebDriver E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Selenium Tests
        run: npm run test:selenium

  test-robot:
    name: Robot Framework E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install NPM dependencies
        run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Robot Framework dependencies
        run: pip install robotframework robotframework-seleniumlibrary
      - name: Run Robot Framework Tests
        run: npm run test:robot
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-report
          path: test-results/robot/
          retention-days: 7
